<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>GameZone — Jeux gratuits en ligne</title>
<meta name="description" content="La meilleure plateforme de jeux gratuits en ligne. Jouez sans téléchargement !"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1327366028953246" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root {
  --violet: #6c3cff;
  --violet2: #9b6dff;
  --rose: #ff3c78;
  --jaune: #ffd600;
  --vert: #00e676;
  --fond: #0d0d1a;
  --fond2: #13132a;
  --fond3: #1a1a35;
  --bordure: #2a2a4a;
  --texte: #f0eeff;
  --muted: #8888aa;
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--fond);
  color: var(--texte);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* HEADER MOBILE */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--fond2);
  border-bottom: 1px solid var(--bordure);
  position: sticky; top: 0; z-index: 100;
}
.logo-text { font-family: 'Fredoka One', cursive; font-size: 22px; background: linear-gradient(135deg, var(--violet2), #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
.search-wrap { flex: 1; position: relative; }
.search-input { width: 100%; background: var(--fond3); border: 1px solid var(--bordure); border-radius: 10px; color: var(--texte); font-size: 15px; padding: 9px 14px 9px 36px; font-family: 'Nunito', sans-serif; }
.search-input:focus { outline: none; border-color: var(--violet2); }
.search-input::placeholder { color: var(--muted); }
.search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--muted); pointer-events: none; }
.btn-random { background: linear-gradient(135deg, var(--violet), var(--rose)); color: white; border: none; border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

/* CATÉGORIES */
.cats-wrap { padding: 14px 16px 8px; }
.cats-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.cats-scroll::-webkit-scrollbar { display: none; }
.cat-btn { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--bordure); background: var(--fond2); color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'Nunito', sans-serif; transition: all .2s; }
.cat-btn.active { background: linear-gradient(135deg, var(--violet), var(--violet2)); color: white; border-color: transparent; }

/* GRILLE */
.section { padding: 8px 16px 16px; }
.section-title { font-family: 'Fredoka One', cursive; font-size: 19px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media(min-width: 500px) { .games-grid { grid-template-columns: repeat(3, 1fr); } }
@media(min-width: 768px) { .games-grid { grid-template-columns: repeat(4, 1fr); } }

/* CARTE JEU */
.game-card { background: var(--fond2); border: 1px solid var(--bordure); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform .2s; active-scale: .97; position: relative; }
.game-card:active { transform: scale(.97); }
.game-thumb { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-size: 44px; position: relative; overflow: hidden; }
.game-thumb img { width: 100%; height: 100%; object-fit: cover; }
.game-play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.game-card:hover .game-play-overlay { opacity: 1; }
.play-ico { background: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: var(--fond); }
.game-info { padding: 10px; }
.game-name { font-size: 13px; font-weight: 800; margin-bottom: 4px; line-height: 1.3; }
.game-meta { display: flex; justify-content: space-between; align-items: center; }
.game-cat { font-size: 11px; color: var(--muted); font-weight: 600; }
.game-note { font-size: 11px; color: var(--jaune); font-weight: 700; }
.game-badge { position: absolute; top: 7px; left: 7px; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; }
.badge-new { background: var(--vert); color: #003a1a; }
.badge-hot { background: var(--rose); color: white; }
.badge-top { background: var(--jaune); color: #3a2a00; }

/* MODAL JEU */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 200; display: none; flex-direction: column; }
.modal-overlay.open { display: flex; }
.modal-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--fond2); border-bottom: 1px solid var(--bordure); flex-shrink: 0; }
.modal-back { background: var(--fond3); border: 1px solid var(--bordure); border-radius: 8px; color: var(--texte); font-size: 20px; padding: 6px 12px; cursor: pointer; flex-shrink: 0; }
.modal-info { flex: 1; min-width: 0; }
.modal-title { font-family: 'Fredoka One', cursive; font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-sub { font-size: 12px; color: var(--muted); }
.btn-fullscreen-modal { background: var(--violet); color: white; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; flex-shrink: 0; }
.game-frame-wrap { flex: 1; position: relative; background: #000; }
.game-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
.game-frame-wrap .game-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; text-align: center; }
.game-placeholder .big-ico { font-size: 72px; }
.game-placeholder h2 { font-family: 'Fredoka One', cursive; font-size: 24px; }
.game-placeholder p { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 300px; }
.btn-launch { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--violet), var(--rose)); color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; text-decoration: none; }

/* FOOTER */
.footer { background: var(--fond2); border-top: 1px solid var(--bordure); padding: 24px 16px; margin-top: 8px; text-align: center; }
.footer-logo { font-family: 'Fredoka One', cursive; font-size: 20px; background: linear-gradient(135deg, var(--violet2), #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
.footer-note { font-size: 12px; color: var(--muted); line-height: 1.6; }
.footer-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
.footer-link { font-size: 12px; color: var(--muted); cursor: pointer; }
.footer-link:hover { color: var(--violet2); }

/* BANNER PUB */
.pub-banner { background: var(--fond2); border: 1px dashed var(--bordure); border-radius: var(--radius); padding: 14px; text-align: center; margin: 0 16px 16px; }
.pub-banner p { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-text">🎮 GameZone</div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" type="text" placeholder="Rechercher..." oninput="searchGames(this.value)" id="searchInput"/>
  </div>
  <button class="btn-random" onclick="openRandom()">🎲</button>
</header>

<!-- CATÉGORIES -->
<div class="cats-wrap">
  <div class="cats-scroll" id="catsBar"></div>
</div>

<!-- BANNIÈRE PUB -->
<div class="pub-banner">
  <p>📢 Publicité</p>
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1327366028953246" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
</div>

<!-- JEUX -->
<div class="section">
  <div class="section-title" id="sectionTitle">🎮 Tous les jeux</div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">GameZone</div>
  <div class="footer-note">Jeux 100% gratuits · Sans téléchargement · Jouez partout</div>
  <div class="footer-links">
    <span class="footer-link">À propos</span>
    <span class="footer-link">Contact</span>
    <span class="footer-link">Mentions légales</span>
    <span class="footer-link">Confidentialité</span>
  </div>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-header">
    <button class="modal-back" onclick="closeModal()">←</button>
    <div class="modal-info">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-sub" id="modalSub"></div>
    </div>
    <button class="btn-fullscreen-modal" onclick="goFullscreen()">⛶ Plein écran</button>
  </div>
  <div class="game-frame-wrap" id="gameFrameWrap"></div>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});

const CATS = [
  {label:'Tous', ico:'🎮'},
  {label:'Action', ico:'⚔️'},
  {label:'Puzzle', ico:'🧩'},
  {label:'Sport', ico:'⚽'},
  {label:'Course', ico:'🏎️'},
  {label:'Aventure', ico:'🗺️'},
  {label:'Arcade', ico:'👾'},
  {label:'Cartes', ico:'🃏'},
];

// Vrais jeux intégrables via iframe (domaines publics ou open source)
const JEUX = [
  // PUZZLE
  {id:1, nom:'2048', ico:'🔢', cat:'Puzzle', couleur:'linear-gradient(135deg,#1a1200,#4a3500)', note:'4.9', badge:'top', joueurs:'12M',
   url:'https://play2048.co/', desc:'Le célèbre jeu de nombres — atteins la tuile 2048 !'},
  {id:2, nom:'Sudoku', ico:'🧩', cat:'Puzzle', couleur:'linear-gradient(135deg,#001a1a,#004040)', note:'4.7', badge:'', joueurs:'8M',
   url:'https://sudoku.com/', desc:'Le sudoku classique en ligne, plusieurs niveaux'},
  {id:3, nom:'Mots Mêlés', ico:'📝', cat:'Puzzle', couleur:'linear-gradient(135deg,#001a00,#003a00)', note:'4.6', badge:'new', joueurs:'3M',
   url:'https://www.wordgames.com/fr/wordsearch.html', desc:'Trouve les mots cachés dans la grille'},
  {id:4, nom:'Tetris', ico:'🟦', cat:'Puzzle', couleur:'linear-gradient(135deg,#00001a,#00003a)', note:'4.9', badge:'top', joueurs:'20M',
   url:'https://tetris.com/play-tetris', desc:'Le légendaire jeu de blocs qui tombe'},
  // ARCADE
  {id:5, nom:'Snake', ico:'🐍', cat:'Arcade', couleur:'linear-gradient(135deg,#001a00,#003300)', note:'4.8', badge:'hot', joueurs:'15M',
   url:'https://playsnake.org/', desc:'Le serpent classique — mange et grandis !'},
  {id:6, nom:'Pac-Man', ico:'👾', cat:'Arcade', couleur:'linear-gradient(135deg,#1a1a00,#3a3a00)', note:'4.9', badge:'top', joueurs:'25M',
   url:'https://www.google.com/logos/2010/pacman10-i.html', desc:'Le mythique Pac-Man version Google'},
  {id:7, nom:'Flappy Bird', ico:'🐦', cat:'Arcade', couleur:'linear-gradient(135deg,#001a3a,#003a6a)', note:'4.7', badge:'hot', joueurs:'10M',
   url:'https://flappybird.io/', desc:'Passe entre les tuyaux sans tomber !'},
  {id:8, nom:'Dino Run', ico:'🦕', cat:'Arcade', couleur:'linear-gradient(135deg,#1a1a1a,#2a2a2a)', note:'4.8', badge:'', joueurs:'9M',
   url:'https://chromedino.com/', desc:'Le dinosaure de Chrome — saute par-dessus les cactus'},
  // ACTION
  {id:9, nom:'Shell Shockers', ico:'🥚', cat:'Action', couleur:'linear-gradient(135deg,#1a0000,#3a0000)', note:'4.7', badge:'hot', joueurs:'5M',
   url:'https://shellshock.io/', desc:'Jeu de tir multijoueur avec des œufs armés !'},
  {id:10, nom:'Krunker.io', ico:'🎯', cat:'Action', couleur:'linear-gradient(135deg,#001a00,#002a00)', note:'4.8', badge:'top', joueurs:'8M',
   url:'https://krunker.io/', desc:'FPS multijoueur rapide directement dans ton navigateur'},
  {id:11, nom:'Zombs Royale', ico:'🧟', cat:'Action', couleur:'linear-gradient(135deg,#0a1a00,#1a3000)', note:'4.6', badge:'', joueurs:'4M',
   url:'https://zombsroyale.io/', desc:'Battle royale 2D en ligne — sois le dernier survivant'},
  {id:12, nom:'Surviv.io', ico:'🔫', cat:'Action', couleur:'linear-gradient(135deg,#001a00,#003a00)', note:'4.7', badge:'new', joueurs:'6M',
   url:'https://surviv.io/', desc:'Battle royale de survie multijoueur'},
  // SPORT
  {id:13, nom:'Football Heads', ico:'⚽', cat:'Sport', couleur:'linear-gradient(135deg,#003a00,#007a00)', note:'4.7', badge:'hot', joueurs:'3M',
   url:'https://www.footballheads.com/', desc:'Football avec des grosses têtes — trop fun !'},
  {id:14, nom:'Basket Random', ico:'🏀', cat:'Sport', couleur:'linear-gradient(135deg,#3a1a00,#7a3a00)', note:'4.8', badge:'top', joueurs:'4M',
   url:'https://www.y8.com/games/basketball_random', desc:'Basket complètement fou et aléatoire !'},
  // COURSE
  {id:15, nom:'Moto X3M', ico:'🏍️', cat:'Course', couleur:'linear-gradient(135deg,#1a1a00,#3a3a00)', note:'4.9', badge:'top', joueurs:'7M',
   url:'https://www.crazygames.com/game/moto-x3m', desc:'Course de moto avec des cascades incroyables'},
  {id:16, nom:'Road Fury', ico:'🏎️', cat:'Course', couleur:'linear-gradient(135deg,#1a0000,#3a0000)', note:'4.6', badge:'', joueurs:'2M',
   url:'https://www.crazygames.com/game/road-fury', desc:'Course de voitures avec des obstacles fous'},
  // AVENTURE
  {id:17, nom:'Fireboy & Watergirl', ico:'🔥', cat:'Aventure', couleur:'linear-gradient(135deg,#1a0a00,#3a1500)', note:'4.9', badge:'top', joueurs:'15M',
   url:'https://www.coolmathgames.com/0-fireboy-and-watergirl-in-the-forest-temple', desc:'Jeu de coopération avec Fireboy et Watergirl'},
  {id:18, nom:'Run 3', ico:'🏃', cat:'Aventure', couleur:'linear-gradient(135deg,#00001a,#00003a)', note:'4.8', badge:'hot', joueurs:'10M',
   url:'https://www.coolmathgames.com/0-run-3', desc:'Cours dans l\'espace et évite les trous !'},
  // CARTES
  {id:19, nom:'Solitaire', ico:'🃏', cat:'Cartes', couleur:'linear-gradient(135deg,#001a00,#003a00)', note:'4.7', badge:'', joueurs:'20M',
   url:'https://www.solitaire.org/', desc:'Le classique Solitaire en ligne'},
  {id:20, nom:'Spider Solitaire', ico:'🕷️', cat:'Cartes', couleur:'linear-gradient(135deg,#1a001a,#3a003a)', note:'4.6', badge:'', joueurs:'8M',
   url:'https://spidersolitaire.org/', desc:'Spider Solitaire — le solitaire à plusieurs colonnes'},
];

let catActive = 'Tous';
let searchQuery = '';

function buildCats() {
  document.getElementById('catsBar').innerHTML = CATS.map(c =>
    `<button class="cat-btn${c.label===catActive?' active':''}" onclick="filterCat('${c.label}')">${c.ico} ${c.label}</button>`
  ).join('');
}

function filterCat(cat) {
  catActive = cat;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  buildCats();
  renderGames();
}

function searchGames(q) {
  searchQuery = q.toLowerCase();
  catActive = 'Tous';
  buildCats();
  renderGames();
}

function renderGames() {
  let filtered = JEUX;
  if (catActive !== 'Tous') filtered = filtered.filter(j => j.cat === catActive);
  if (searchQuery) filtered = filtered.filter(j => j.nom.toLowerCase().includes(searchQuery));

  const icons = {Tous:'🎮',Action:'⚔️',Puzzle:'🧩',Sport:'⚽',Course:'🏎️',Aventure:'🗺️',Arcade:'👾',Cartes:'🃏'};
  document.getElementById('sectionTitle').textContent = (icons[catActive]||'🎮') + ' ' + (searchQuery ? `Résultats pour "${searchQuery}"` : catActive === 'Tous' ? 'Tous les jeux' : 'Jeux ' + catActive);

  document.getElementById('gamesGrid').innerHTML = filtered.map(j => `
    <div class="game-card" onclick="openGame(${j.id})">
      ${j.badge ? `<span class="game-badge badge-${j.badge}">${j.badge==='new'?'Nouveau':j.badge==='hot'?'🔥':'⭐ Top'}</span>` : ''}
      <div class="game-thumb" style="background:${j.couleur}">
        ${j.ico}
        <div class="game-play-overlay"><div class="play-ico">▶</div></div>
      </div>
      <div class="game-info">
        <div class="game-name">${j.nom}</div>
        <div class="game-meta">
          <span class="game-cat">${j.cat}</span>
          <span class="game-note">⭐ ${j.note}</span>
        </div>
      </div>
    </div>`
  ).join('') || '<div style="color:var(--muted);padding:24px;grid-column:1/-1;text-align:center;font-size:15px;">Aucun jeu trouvé 😕</div>';
}

function openGame(id) {
  const j = JEUX.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = j.nom;
  document.getElementById('modalSub').textContent = j.cat + ' · ⭐ ' + j.note + ' · ' + j.joueurs + ' joueurs';

  document.getElementById('gameFrameWrap').innerHTML = `
    <div class="game-placeholder">
      <div class="big-ico">${j.ico}</div>
      <h2>${j.nom}</h2>
      <p>${j.desc}</p>
      <a class="btn-launch" href="${j.url}" target="_blank" rel="noopener">▶ Lancer le jeu</a>
      <p style="font-size:12px;color:var(--muted);margin-top:12px;">Le jeu s'ouvrira dans un nouvel onglet</p>
    </div>`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('gameFrameWrap').innerHTML = '';
  document.body.style.overflow = '';
}

function goFullscreen() {
  const j = JEUX.find(x => x.nom === document.getElementById('modalTitle').textContent);
  if (j) window.open(j.url, '_blank');
}

function openRandom() {
  const r = JEUX[Math.floor(Math.random() * JEUX.length)];
  openGame(r.id);
}

buildCats();
renderGames();
</script>
</body>
</html>
